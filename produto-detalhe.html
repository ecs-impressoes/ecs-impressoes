<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe do Produto | StickerStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Mesmo CSS base */
  </style>
</head>
<body>
<!-- top-bar, main-header, main-nav, footer idênticos ao index -->

<div class="conteiner">
  <div class="breadcrumbs">
    <a href="index.html">Início</a> &nbsp;/&nbsp;
    <a href="etiquetas-adesivas.html">Etiquetas Adesivas</a> &nbsp;/&nbsp;
    <strong id="produto-nome"></strong>
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 40px; margin: 40px 0;">
    <div style="flex: 1; min-width: 200px;">
      <img id="produto-img" src="" alt="" style="width:100%; border-radius: 20px;">
    </div>
    <div style="flex: 1;">
      <h1 id="produto-titulo" style="font-size: 28px; margin-bottom: 16px;"></h1>
      <div class="price" id="produto-preco" style="font-size: 32px;"></div>
      <p style="margin: 16px 0; color: #4a5b6e;">Produto de alta qualidade. Adicione ao carrinho e finalize a compra.</p>
      <div style="display: flex; align-items: center; gap: 16px; margin-top: 24px;">
        <input type="number" id="quantidade" value="1" min="1" style="width: 80px; padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
        <button id="addToCartBtn" class="btn-buy" style="width: auto; padding: 10px 24px;">Adicionar ao carrinho</button>
      </div>
    </div>
  </div>
</div>

<footer>...</footer>
<div id="contactModal" class="modal">...</div>

<script>
  const produtos = [ /* mesmos produtos do index */ ];

  const urlParams = new URLSearchParams(window.location.search);
  const produtoId = parseInt(urlParams.get('id'));
  const produto = produtos.find(p => p.id === produtoId);

  if (produto) {
    document.getElementById('produto-nome').innerText = produto.nome;
    document.getElementById('produto-titulo').innerText = produto.nome;
    document.getElementById('produto-preco').innerHTML = `R$ ${produto.preco.toFixed(2)}`;
    document.getElementById('produto-img').src = produto.img;
    document.getElementById('produto-img').alt = produto.nome;
  } else {
    document.querySelector('.breadcrumbs strong').innerText = 'Produto não encontrado';
  }

  function atualizarCarrinhoCount() {
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    let total = carrinho.reduce((acc, item) => acc + item.quantidade, 0);
    document.querySelectorAll('.cart-count').forEach(el => el.innerText = total);
  }

  document.getElementById('addToCartBtn').addEventListener('click', () => {
    let quantidade = parseInt(document.getElementById('quantidade').value);
    if (isNaN(quantidade) || quantidade < 1) quantidade = 1;

    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    const existing = carrinho.find(item => item.id === produto.id);
    if (existing) {
      existing.quantidade += quantidade;
    } else {
      carrinho.push({
        id: produto.id,
        nome: produto.nome,
        preco: produto.preco,
        quantidade: quantidade,
        img: produto.img
      });
    }
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    atualizarCarrinhoCount();
    alert('Produto adicionado ao carrinho!');
  });

  atualizarCarrinhoCount();

  // Modal contato
  const modal = document.getElementById('contactModal');
  document.querySelectorAll('#openContactModal').forEach(btn => {
    btn.addEventListener('click', (e) => { e.preventDefault(); modal.style.display = 'flex'; });
  });
  document.querySelector('.close-modal')?.addEventListener('click', () => { modal.style.display = 'none'; });
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  document.getElementById('contactForm')?.addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Mensagem enviada com sucesso!');
    modal.style.display = 'none';
    e.target.reset();
  });
</script>
</body>
</html>
