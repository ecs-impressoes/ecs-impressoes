<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | StickerStore</title>
  <!-- CSS base -->
  <style>
    /* mesmo CSS base */
    .checkout-form { background: white; padding: 32px; border-radius: 20px; margin: 20px 0; }
    .form-row { margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
    .form-group { flex: 1; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    .order-summary { background: #f1f5f9; padding: 20px; border-radius: 16px; margin-top: 24px; }
  </style>
</head>
<body>
<!-- top-bar, main-header, main-nav -->

<div class="conteiner">
  <div class="breadcrumbs">
    <a href="index.html">Início</a> &nbsp;/&nbsp;
    <a href="carrinho.html">Carrinho</a> &nbsp;/&nbsp;
    <strong>Checkout</strong>
  </div>
  <h1 class="page-title">Finalizar Compra</h1>

  <div class="checkout-form">
    <form id="checkoutForm">
      <div class="form-row">
        <div class="form-group"><label>Nome completo *</label><input type="text" required></div>
        <div class="form-group"><label>CPF *</label><input type="text" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>E-mail *</label><input type="email" required></div>
        <div class="form-group"><label>Telefone *</label><input type="tel" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>CEP *</label><input type="text" required></div>
        <div class="form-group"><label>Endereço *</label><input type="text" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Número *</label><input type="text" required></div>
        <div class="form-group"><label>Complemento</label><input type="text"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Cidade *</label><input type="text" required></div>
        <div class="form-group"><label>Estado *</label><select required><option>SP</option><option>RJ</option><option>MG</option></select></div>
      </div>
      <div class="form-group"><label>Forma de pagamento *</label><select required><option>Cartão de Crédito</option><option>Boleto Bancário</option><option>PIX</option></select></div>

      <div class="order-summary">
        <h3>Resumo do pedido</h3>
        <div id="order-items"></div>
        <div style="font-size: 20px; font-weight: bold; margin-top: 16px;" id="order-total"></div>
      </div>

      <button type="submit" class="btn-submit" style="margin-top: 24px;">Confirmar Pedido</button>
    </form>
  </div>
</div>

<footer>...</footer>
<div id="contactModal" class="modal">...</div>

<script>
  function renderResumo() {
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    if (carrinho.length === 0) {
      window.location.href = 'carrinho.html';
      return;
    }
    let total = 0;
    const itemsHtml = carrinho.map(item => {
      total += item.preco * item.quantidade;
      return `<div>${item.nome} x ${item.quantidade} = R$ ${(item.preco * item.quantidade).toFixed(2)}</div>`;
    }).join('');
    document.getElementById('order-items').innerHTML = itemsHtml;
    document.getElementById('order-total').innerHTML = `Total: R$ ${total.toFixed(2)}`;
  }

  document.getElementById('checkoutForm').addEventListener('submit', (e) => {
    e.preventDefault();
    // Simular envio do pedido
    alert('Pedido finalizado com sucesso! Obrigado pela compra.');
    localStorage.removeItem('carrinho');
    window.location.href = 'index.html';
  });

  renderResumo();
  // Atualizar contador do carrinho
  function atualizarCarrinhoCount() {
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    let total = carrinho.reduce((acc, item) => acc + item.quantidade, 0);
    document.querySelectorAll('.cart-count').forEach(el => el.innerText = total);
  }
  atualizarCarrinhoCount();
</script>
</body>
</html>
